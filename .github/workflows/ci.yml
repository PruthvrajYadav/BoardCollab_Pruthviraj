name: BoardCollab CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend-test:
    name: Backend CI (Node/Express)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm install

      - name: Run Backend Unit Tests
        working-directory: ./backend
        run: npm test

  frontend-test:
    name: Frontend CI (React/Vite)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm install

      - name: Install Canvas for Vitest JSDOM
        working-directory: ./frontend
        run: npm install canvas --no-save

      - name: Run Frontend Tests
        working-directory: ./frontend
        run: npm run test

# Once these jobs pass, platforms like Vercel and Render automatically detect the successful GitHub check and deploy your application.
