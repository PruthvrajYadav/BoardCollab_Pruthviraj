version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: boardcollab_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: boardcollab

  redis:
    image: redis:alpine
    container_name: boardcollab_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  mongo_data:
  redis_data:
